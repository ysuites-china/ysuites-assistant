var AVAILABILITY_DATA = null;
var AVAILABILITY_LOAD_ERROR = null;

async function loadAvailability() {
  try {
    // cache-bust with timestamp
    var res = await fetch('./data/availability.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    AVAILABILITY_DATA = await res.json();
  } catch(e) {
    AVAILABILITY_LOAD_ERROR = e.message;
    console.warn('Availability load failed:', e);
  }
}
loadAvailability();

function formatAvailabilityContext() {
  if (!AVAILABILITY_DATA) return '';
  var d = AVAILABILITY_DATA;
  var updated = new Date(d.lastUpdated);
  var now = new Date();
  var ageMin = Math.round((now - updated) / 60000);
  var ageStr = ageMin < 60 ? ageMin + '分钟前' :
               ageMin < 1440 ? Math.round(ageMin/60) + '小时前' :
               Math.round(ageMin/1440) + '天前';

  var lines = [];
  lines.push('【实时房态 — ' + d.propertyName + '（数据' + ageStr + '从RMS抓取，每天9am和4pm自动更新）】');
  lines.push('');
  lines.push('房型代码说明：');
  for (var code in d.categoryDisplayNames) {
    lines.push('  ' + code + ' = ' + d.categoryDisplayNames[code]);
  }
  lines.push('');
  lines.push('每日可用房数（房型代码:剩余间数）：');
  var keys = Object.keys(d.availability).sort();
  // skip past dates
  var today = new Date().toISOString().slice(0,10);
  for (var i = 0; i < keys.length; i++) {
    var date = keys[i];
    if (date < today) continue;
    var a = d.availability[date];
    var parts = [];
    for (var k in a) parts.push(k + ':' + a[k]);
    lines.push(date + ' → ' + parts.join(', '));
  }
  lines.push('');
  lines.push('回答房态问题的硬性规则：');
  lines.push('1. 只能基于以上数据回答，不得编造任何数字。');
  lines.push('2. 用户问某日某房型时，定位到具体日期+房型代码，报数字。例：用户问"7月12日有Studio吗"→ 查2026-07-12，SP-High:5, SP-Low:10, SD-High:1, SD-Low:0，回答"Studio Premium 高楼层剩5间、低楼层剩10间，Studio Deluxe 高楼层剩1间、低楼层0间"。');
  lines.push('3. 楼层信息：不公开具体楼层数，统一说"具体楼层以入住时实际安排为准"。');
  lines.push('4. 价格：现阶段助手不出具体报价，回答"请群内查看最新报价"。');
  lines.push('5. 如果该日期不在数据范围内（180天以外），说"暂未开放该日期的房态查询，请联系Y Suites同事确认"。');
  lines.push('6. 数据更新时间是' + updated.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}) + '，可以告诉客户"截至xx时间"以体现时效性。');
  return lines.join('\n');
}

var currentProject = null;
var currentFlow = null;
var flowIndex = 0;
var chatHistory = [];
var isLoading = false;

function startProject(proj) {
  currentProject = proj;
  chatHistory = [];
  document.getElementById('select-screen').style.display = 'none';
  var cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  var labels = { mg:'Sydney · MG', starvia:'Hong Kong · Starvia', both:'Sydney & Hong Kong' };
  document.getElementById('header-sub').textContent = labels[proj];

  var header = document.getElementById('main-header');
  var backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.textContent = '← 返回';
  backBtn.onclick = goBack;
  header.querySelector('.header-left').prepend(backBtn);

  if (proj === 'both') {
    addAIMessage("你好！👋 我是 **Y Suites助手**，可以回答关于悉尼MG和香港Starvia的所有问题，直接问我吧！", null, null);
    document.getElementById('send-btn').disabled = false;
  } else {
    currentFlow = FLOWS[proj];
    flowIndex = 0;
    showFlowStep(0);
  }
  document.getElementById('msg-input').focus();
}

function goBack() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.getElementById('header-sub').textContent = '请选择项目';
  document.getElementById('messages').innerHTML = '';
  var backBtn = document.querySelector('.back-btn');
  if (backBtn) backBtn.remove();
  currentProject = null;
  currentFlow = null;
  chatHistory = [];
  document.getElementById('send-btn').disabled = true;
  document.getElementById('msg-input').value = '';
}

function showFlowStep(index) {
  var step = currentFlow[index];
  if (!step) return;
  setTimeout(function() {
    addAIMessage(step.text, step.options, step.id);
  }, index === 0 ? 0 : 300);
}

function handleOption(option, flowId) {
  addUserMessage(option);
  var freeChat = ["我有问题先问","还有问题想问","想了解更多学校距离","想了解更多学校","想多了解品牌","想了解具体房型","了解设施与服务"];
  if (freeChat.includes(option)) {
    addAIMessage("当然！直接问我吧 👇", null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  if (option === "我全了解了！") {
    var done = currentFlow[currentFlow.length - 1];
    addAIMessage(done.text, null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  var idx = currentFlow.findIndex(function(s){ return s.id === flowId; });
  var next = idx + 1;
  if (next < currentFlow.length) {
    flowIndex = next;
    showFlowStep(next);
  }
  document.getElementById('send-btn').disabled = false;
}

function addAIMessage(text, options, flowId) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';

  var av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = 'Y';

  var bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);

  if (options) {
    var optDiv = document.createElement('div');
    optDiv.className = 'options';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = function() { handleOption(opt, flowId); };
      optDiv.appendChild(btn);
    });
    msgs.appendChild(optDiv);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg user';
  var av = document.createElement('div');
  av.className = 'avatar user';
  av.textContent = '我';
  var bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar ai">Y</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });
  var typing = addTyping();

  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEMS[currentProject || 'both'] + '\n\n' + formatAvailabilityContext() },
          ...chatHistory
        ],
        max_tokens: 800
      })
    });
    var data = await res.json();
    var reply = data.choices && data.choices[0] ? data.choices[0].message.content : '抱歉，暂时无法回答，请直接在群里问Y Suites同事 😊';
    typing.remove();
    chatHistory.push({ role: 'assistant', content: reply });
    addAIMessage(reply, null, null);
  } catch(e) {
    typing.remove();
    addAIMessage('连接出现问题，请直接在群里问Y Suites同事 😊', null, null);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
