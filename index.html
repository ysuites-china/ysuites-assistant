var AVAILABILITY_DATA = null;
var AVAILABILITY_LOAD_ERROR = null;

async function loadAvailability() {
  try {
    // cache-bust with timestamp
    var res = await fetch('./data/availability.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    AVAILABILITY_DATA = await res.json();
  } catch(e) {
    AVAILABILITY_LOAD_ERROR = e.message;
    console.warn('Availability load failed:', e);
  }
}
loadAvailability();

function formatAvailabilityContext() {
  if (!AVAILABILITY_DATA) return '';
  var d = AVAILABILITY_DATA;
  var updated = new Date(d.lastUpdated);
  var now = new Date();
  var ageMin = Math.round((now - updated) / 60000);
  var ageStr = ageMin < 60 ? ageMin + '分钟前' :
               ageMin < 1440 ? Math.round(ageMin/60) + '小时前' :
               Math.round(ageMin/1440) + '天前';

  var lines = [];
  lines.push('【实时房态——仅适用 Y Suites on Margaret (MG悉尼项目)】数据 ' + ageStr + ' 从 RMS 抓取。');
  lines.push('');
  lines.push('⚠️ 严重警告：以下房态数据【仅适用】 MG (Y Suites on Margaret, 悉尼Redfern)。');
  lines.push('如果中介问的是 Starvia by Y Suites (FH/Fortress Hill, 香港炮台山)，');
  lines.push('绝对禁止套用以下任何数字。Starvia 暂无实时房态接入，统一回复"实时房态请群内查询置顶或联系 Y Suites 同事确认"。');
  lines.push('');
  lines.push('MG 房型代码：');
  for (var code in d.categoryDisplayNames) {
    lines.push('  ' + code + ' = ' + d.categoryDisplayNames[code]);
  }
  lines.push('');
  lines.push('每日剩余（数字已按全部规则过滤，直接报数即可）：');
  var keys = Object.keys(d.availability).sort();
  var today = new Date().toISOString().slice(0,10);
  var setsByDate = d.setsByDate || {};
  for (var i = 0; i < keys.length; i++) {
    var date = keys[i];
    if (date < today) continue;
    var a = d.availability[date];
    var parts = [];
    for (var k in a) parts.push(k + ':' + a[k]);
    if (setsByDate[date]) {
      for (var sk in setsByDate[date]) parts.push(sk + '-set:' + setsByDate[date][sk]);
    }
    lines.push(date + ' → ' + parts.join(', '));
  }
  lines.push('');
  lines.push('═════ 查房规则 ═════');
  lines.push('');
  lines.push('1. 先问租期（如客户未说）：Semester(12/22) / HalfYear(1/26或2/2) / FullYear(7/7或7/14)');

  lines.push('   • 7月非固定日，必须 fix 到同周固定起租日（lease start 用固定日，客户可晚到，多几天租金照付）：');
  lines.push('       7.15-7.20 → fix 到 7.14');
  lines.push('       7.22-7.27 → fix 到 7.21');
  lines.push('       回答模板：例 客户问 7.24 → 答 7.24 需 fix 到 7.21 起租；该周房态 SP-H:X / SP-L:Y / 2BR-H:Z…；客户可 7.24 实际入住，租金从 7.21 起算。严禁说"灵活入住"或"无需调价"。');
  lines.push('   • 8月：报数 + 提醒"7.28 是默认最晚入住日"');
  lines.push('   • 9月：数字已按 8.15 后退租房源过滤，直接报数即可（清洁排期问题再让人工确认）');
  lines.push('   • 10月+：转人工');
  lines.push('');
  lines.push('3. 周末入住主动建议改前一个周五。2026/9 内 9/5、9/12、9/19、9/26 均为周六。');
  lines.push('');
  var hasSets = false;
  for (var dk in setsByDate) { if (setsByDate[dk] && Object.keys(setsByDate[dk]).length) { hasSets = true; break; } }
  if (hasSets) {
    lines.push('4. 2BR（仅限 2BR）：2BR-High / 2BR-Low = 床位数；2BR-High-set / 2BR-Low-set = 整套数（aa.bb.01 与 aa.bb.02 同时空）。客户要整套 → 直接用 -set 数字回答"有 X 套"，无需让人工确认整套是否都空；客户要床位 → 用普通数字 + 附"性别配对请人工确认"。');

  lines.push('8. 不得编造任何数字');
  return lines.join('\n');

  both: "你是Y Suites中介内部培训助手（内部专用）。\n\n【🚨 绝对优先级 — 反幻觉硬规则（高于一切其他规则）🚨】\n① 知识库（下方 MG_KB / STARVIA_KB）里没有的东西，绝对不要编造。\n② 不要猜：不知道城市、价格、促销代码、租期、面积、房型代号、Agent Code、退租日、起租日等任何具体信息时，直接说【这个我不确定，请群内联系 Y Suites 同事确认】。\n③ 不要发明促销：促销代码和金额只能引用知识库已经列出的（MG=S226MGEARLYTI / S226MGEARLYTFY，Starvia=26SYSFEARLY1），绝不能自创 额外赠送 / 限时折扣 / 双倍 Rebate 等任何未列出的优惠。\n④ 不要混淆项目：MG = 悉尼 Sydney（绝对不是墨尔本），Starvia = 香港 Hong Kong；MG 起租 = 7.14/7.21/7.28（July），Starvia 起租 = 8 月 9-19 日；房型完全不同（MG=SP/SD/ENP/2BR；Starvia=Studio Deluxe/2-3-4 BR Premium/Standard）。绝对不能跨项目套用任何字段。\n⑤ 搞不定的转人工：任何你不能 100% 从知识库证实的内容，统一回答【这个需要群内联系 Y Suites 同事确认】。绝对不能用模糊词例如 大概 / 应该 / 可能 来回答具体数字、日期、规则。\n⑥ 不要凭训练记忆回答：你的预训练知识里关于 Y Suites / Starvia 的任何内容都可能过时或错误，一切以下方知识库为准。\n\nMG知识库：\n" + MG_KB + "\n\nStarvia知识库：\n" + STARVIA_KB + "\n\n规则：1.说话自然有活人感。2.MG价格促销以群内最新为准。MG机场交通补贴：凭悉尼机场→Margaret车票（Taxi/Train receipt）发至reservations@ysuites.co，【实报实销，封顶A$50】——票面金额低于50按实际报销（如A$30→A$30 Rebate），超过50按A$50封顶。绝对不可以说\"直接给A$50\"。3.Starvia只提Early Bird均摊月租。4.Starvia水电费单独收，Early Bird减半，预缴一律不退无任何退款。5.Starvia工作人员不拉客户群。6.看房群内报备。7.Starvia有HK$300 Uber接站代金券福利。7.不确定内容以群内答复为准。8.不攻击竞品，对比末尾注明仅供参考。9.适当用emoji。10.【MG = Sydney (NSW)，Starvia = Hong Kong——硬性】MG 在悉尼 Sydney NSW (Redfern)，绝不在墨尔本。Starvia 在香港 Hong Kong (Fortress Hill / 炮台山)。不能混淆两个城市，不能把 MG 说成墨尔本，不能给 Starvia 套悉尼信息。\n11.【MG = July 起租 (7.14/7.21/7.28)，Starvia = August 起租 (8月9-19日)——硬性】MG 答复绝不能出现 8 月起租日；Starvia 答复绝不能出现 7 月日期或 July checkin 词汇。\n12.【严禁跨项目套用房态】实时房态数据仅适用 MG，被问 Starvia 房态时必须明确说\"Starvia 暂无实时房态数据接入，请群内查询置顶或联系 Y Suites 同事\"。MG 房型代码（SP/SD/ENP/2BR）和数字绝不可套到 Starvia 答复里。MG 房型≠Starvia 房型。11.【输出风格——重要】回答必须简洁直接，我们的用户是专业中介顾问，他们要快速拿关键信息，不要长篇解释、不要重复客户的问题、不要多余的背景介绍。保留活人感（适当emoji和口语），但每条回复控制在3-5句话内。11.Starvia的面积标的是实际使用面积（非建筑面积），是重要卖点。"

var currentProject = null;
var currentFlow = null;
var flowIndex = 0;
var chatHistory = [];
var isLoading = false;

function startProject(proj) {
  currentProject = proj;
  chatHistory = [];
  document.getElementById('select-screen').style.display = 'none';
  var cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  var labels = { mg:'Sydney · MG', starvia:'Hong Kong · Starvia', both:'Sydney & Hong Kong' };
  document.getElementById('header-sub').textContent = labels[proj];

  var header = document.getElementById('main-header');
  var backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.textContent = '← 返回';
  backBtn.onclick = goBack;
  header.querySelector('.header-left').prepend(backBtn);

  if (proj === 'both') {
    addAIMessage("你好！👋 我是 **Y Suites助手**，可以回答关于悉尼MG和香港Starvia的所有问题，直接问我吧！", null, null);
    document.getElementById('send-btn').disabled = false;
  } else {
    currentFlow = FLOWS[proj];
    flowIndex = 0;
    showFlowStep(0);
  }
  document.getElementById('msg-input').focus();
}

function goBack() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.getElementById('header-sub').textContent = '请选择项目';
  document.getElementById('messages').innerHTML = '';
  var backBtn = document.querySelector('.back-btn');
  if (backBtn) backBtn.remove();
  currentProject = null;
  currentFlow = null;
  chatHistory = [];
  document.getElementById('send-btn').disabled = true;
  document.getElementById('msg-input').value = '';
}

function showFlowStep(index) {
  var step = currentFlow[index];
  if (!step) return;
  setTimeout(function() {
    addAIMessage(step.text, step.options, step.id);
  }, index === 0 ? 0 : 300);
}

function handleOption(option, flowId) {
  addUserMessage(option);
  var freeChat = ["我有问题先问","还有问题想问","想了解更多学校距离","想了解更多学校","想多了解品牌","想了解具体房型","了解设施与服务"];
  if (freeChat.includes(option)) {
    addAIMessage("当然！直接问我吧 👇", null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  if (option === "我全了解了！") {
    var done = currentFlow[currentFlow.length - 1];
    addAIMessage(done.text, null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  var idx = currentFlow.findIndex(function(s){ return s.id === flowId; });
  var next = idx + 1;
  if (next < currentFlow.length) {
    flowIndex = next;
    showFlowStep(next);
  }
  document.getElementById('send-btn').disabled = false;
}

function addAIMessage(text, options, flowId) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';

  var av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = 'Y';

  var bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);

  if (options) {
    var optDiv = document.createElement('div');
    optDiv.className = 'options';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = function() { handleOption(opt, flowId); };
      optDiv.appendChild(btn);
    });
    msgs.appendChild(optDiv);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg user';
  var av = document.createElement('div');
  av.className = 'avatar user';
  av.textContent = '我';
  var bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar ai">Y</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });
  var typing = addTyping();

  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEMS[currentProject || 'both'] + '\n\n' + (currentProject === 'starvia' ? '【实时房态】Starvia by Y Suites（Fortress Hill, 香港项目）暂无实时房态数据接入。被问到 Starvia 房态时，统一回答"实时房态请群内查询置顶或联系 Y Suites 同事确认"。绝对禁止使用任何数字编造房态。' : formatAvailabilityContext()) },
          ...chatHistory
        ],
        max_tokens: 800
      })
    });
    var data = await res.json();
    var reply = data.choices && data.choices[0] ? data.choices[0].message.content : '抱歉，暂时无法回答，请直接在群里问Y Suites同事 😊';
    typing.remove();
    chatHistory.push({ role: 'assistant', content: reply });
    addAIMessage(reply, null, null);
  } catch(e) {
    typing.remove();
    addAIMessage('连接出现问题，请直接在群里问Y Suites同事 😊', null, null);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
