<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Y Suites 中介培训助手 · 内部专用</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root { --teal:#00BAB3; --dark:#1a1a2e; --coral:#F08080; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Montserrat','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(160deg,#0c1220,#1a1a2e,#0d2420);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;left:0;right:0;bottom:0}

/* Header */
.header{width:100%;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(0,186,179,0.15);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:white}
.header-title{color:white;font-weight:800;font-size:13px}
.header-sub{color:var(--teal);font-size:10px;margin-top:1px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.back-btn{background:rgba(255,255,255,0.08);border:none;border-radius:6px;padding:5px 12px;color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;font-family:inherit}

/* Select screen */
#select-screen{width:100%;max-width:480px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.select-logo{width:56px;height:56px;border-radius:14px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:26px;color:white;margin-bottom:20px}
.select-title{font-size:22px;font-weight:900;color:white;text-align:center;line-height:1.3;margin-bottom:8px}
.select-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:36px;text-align:center}
.project-btn{width:100%;background:rgba(0,186,179,0.08);border:1.5px solid rgba(0,186,179,0.3);border-radius:14px;padding:18px 20px;cursor:pointer;text-align:left;margin-bottom:12px;transition:all 0.2s;-webkit-appearance:none}
.project-btn:active{background:rgba(0,186,179,0.18);transform:scale(0.98)}
.project-btn .flag{font-size:22px;margin-bottom:6px}
.project-btn .name{color:white;font-weight:800;font-size:15px;font-family:inherit}
.project-btn .desc{color:rgba(255,255,255,0.4);font-size:11px;margin-top:3px;font-family:inherit}
.both-btn{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;font-family:inherit;-webkit-appearance:none}
.both-btn:active{background:rgba(255,255,255,0.08)}

/* Chat screen */
#chat-screen{width:100%;max-width:680px;position:fixed;top:56px;left:0;right:0;bottom:0;display:none;flex-direction:column;overflow:hidden}
#messages{position:absolute;top:0;left:0;right:0;bottom:80px;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:16px 16px 8px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeUp 0.25s ease}
.msg.user{flex-direction:row-reverse}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:white;margin-top:2px}
.avatar.ai{background:linear-gradient(135deg,var(--teal),#007a75)}
.avatar.user{background:rgba(255,255,255,0.15)}
.bubble{max-width:84%;padding:11px 14px;font-size:13px;line-height:1.75}
.bubble.ai{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border-radius:4px 14px 14px 14px}
.bubble.user{background:var(--teal);color:white;border-radius:14px 4px 14px 14px;font-weight:500}
.bubble.ai strong{color:var(--teal)}
.options{display:flex;flex-wrap:wrap;gap:8px;padding-left:38px;margin-top:4px}
.opt-btn{background:rgba(0,186,179,0.1);border:1.5px solid rgba(0,186,179,0.35);color:var(--teal);padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-appearance:none;transition:all 0.15s}
.opt-btn:active{background:rgba(0,186,179,0.25);color:white}
.typing{display:flex;gap:5px;padding:4px 2px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:0.7;animation:bounce 1s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:0.15s}
.typing span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.5}50%{transform:translateY(-5px);opacity:1}}

/* Input */
.input-wrap{position:absolute;bottom:0;left:0;right:0;padding:8px 16px 16px;background:linear-gradient(to top,#1a1a2e 80%,transparent)}
.input-row{display:flex;gap:8px;align-items:flex-end;background:rgba(255,255,255,0.07);border:1.5px solid rgba(0,186,179,0.25);border-radius:12px;padding:9px 12px}
.input-row:focus-within{border-color:var(--teal)}
#msg-input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:white;resize:none;line-height:1.5;max-height:100px}
#msg-input::placeholder{color:rgba(255,255,255,0.25)}
#send-btn{width:34px;height:34px;background:var(--teal);border:none;border-radius:8px;cursor:pointer;color:white;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none}
#send-btn:disabled{background:rgba(0,186,179,0.2);cursor:not-allowed}
.disclaimer{text-align:center;font-size:9px;color:rgba(255,255,255,0.2);margin-top:6px}
</style>
</head>
<body>

<!-- Header -->
<div class="header" id="main-header">
  <div class="header-left">
    <div class="logo">Y</div>
    <div>
      <div class="header-title">Y Suites 中介培训助手</div>
      <div class="header-sub" id="header-sub">🔒 内部培训专用</div>
    </div>
  </div>
  <div class="online-dot" id="online-dot"></div>
</div>

<!-- Select Screen -->
<div id="select-screen">
  <div class="select-logo">Y</div>
  <div class="select-title">你好！今天想了解<br>哪个项目？</div>
  <div class="select-sub" style="color:rgba(255,186,0,0.8);border:1px solid rgba(255,186,0,0.25);border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:11px;">🔒 中介内部培训专用，请勿对外分享</div>
  <div class="select-sub">选择项目开始培训，或直接进入问答</div>
  <button class="project-btn" onclick="startProject('mg')">
    <div class="flag">🇦🇺</div>
    <div class="name">Y Suites on Margaret</div>
    <div class="desc">悉尼 · Redfern · 409床 · 2025年2月开业</div>
  </button>
  <button class="project-btn" onclick="startProject('starvia')">
    <div class="flag">🇭🇰</div>
    <div class="name">Starvia by Y Suites</div>
    <div class="desc">香港 · Fortress Hill · 246床 · 2026年8月开业</div>
  </button>
  <button class="both-btn" onclick="startProject('both')">两个项目都想了解 →</button>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div id="messages"></div>
  <div class="input-wrap">
    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="有什么问题都可以直接问我…"></textarea>
      <button id="send-btn" disabled>➤</button>
    </div>
    <div class="disclaimer">🔒 内部培训专用 · 内容以官方最新资料为准 · 不确定的以群内答复为准</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 🔑 API配置 — 替换为你的通义千问API Key
// ═══════════════════════════════════════
var API_KEY = "sk-0a8dbabe0f3747389b9f5a2c4db54a03";
var API_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";
var MODEL = "qwen-plus";
// ═══════════════════════════════════════

// ═══════════════════════════════════════
// 🏨 实时房态数据（从RMS Cloud定时抓取）
// ═══════════════════════════════════════
var AVAILABILITY_DATA = null;
var AVAILABILITY_LOAD_ERROR = null;

async function loadAvailability() {
  try {
    // cache-bust with timestamp
    var res = await fetch('./data/availability.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    AVAILABILITY_DATA = await res.json();
  } catch(e) {
    AVAILABILITY_LOAD_ERROR = e.message;
    console.warn('Availability load failed:', e);
  }
}
loadAvailability();

function formatAvailabilityContext() {
  if (!AVAILABILITY_DATA) return '';
  var d = AVAILABILITY_DATA;
  var updated = new Date(d.lastUpdated);
  var now = new Date();
  var ageMin = Math.round((now - updated) / 60000);
  var ageStr = ageMin < 60 ? ageMin + '分钟前' :
               ageMin < 1440 ? Math.round(ageMin/60) + '小时前' :
               Math.round(ageMin/1440) + '天前';

  var lines = [];
  lines.push('【实时房态——仅适用 Y Suites on Margaret (MG悉尼项目)】数据 ' + ageStr + ' 从 RMS 抓取。');
  lines.push('');
  lines.push('⚠️ 严重警告：以下房态数据【仅适用】 MG (Y Suites on Margaret, 悉尼Redfern)。');
  lines.push('如果中介问的是 Starvia by Y Suites (FH/Fortress Hill, 香港炮台山)，');
  lines.push('绝对禁止套用以下任何数字。Starvia 暂无实时房态接入，统一回复"实时房态请群内查询置顶或联系 Y Suites 同事确认"。');
  lines.push('');
  lines.push('MG 房型代码：');
  for (var code in d.categoryDisplayNames) {
    lines.push('  ' + code + ' = ' + d.categoryDisplayNames[code]);
  }
  lines.push('');
  // ─── S2 pre-aggregated: min available across full lease period ───
  // Each check-in date × lease type → min(daily avail) over all days in lease
  // This correctly handles rooms that have a mid-lease booking (e.g. SD-HF free
  // on Jul14 but booked from Jul19 → min = 0 → reported as unavailable).
  function minAvailRange(startStr, endStr) {
    var av = d.availability;
    var result = null;
    var start = new Date(startStr), end = new Date(endStr);
    for (var ds in av) {
      if (ds < startStr || ds >= endStr) continue;
      var day = av[ds];
      if (!result) {
        result = {};
        for (var cat in day) result[cat] = day[cat];
      } else {
        for (var cat in day) {
          if (result[cat] === undefined) result[cat] = day[cat];
          else if (day[cat] < result[cat]) result[cat] = day[cat];
        }
      }
    }
    return result;
  }

  var avKeys = Object.keys(d.availability).sort();
  var lastDate = avKeys[avKeys.length - 1];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0,10);
  var setsByDate = d.setsByDate || {};

  var S2_CHECKINS = [
    { date: '2026-07-14', label: '7月14日' },
    { date: '2026-07-21', label: '7月21日' },
    { date: '2026-07-28', label: '7月28日' }
  ];
  // lease end = day AFTER last occupied day (exclusive upper bound)
  var LEASE_ENDS = [
    { code: 'SEM', label: 'Semester (退租12/22)', end: '2026-12-22' },
    { code: 'HY',  label: 'Half Year (退租2/2)',  end: '2027-02-02' },
    { code: 'FY',  label: 'Full Year (退租7/14)', end: '2027-07-14' }
  ];

  lines.push('【S2 2026 房态——租期连续可用数（核心查房数据）】');
  lines.push('⚠️ 重要：下方每个数字 = 该起租日至退租日【每一天均有空房】的间数（取租期内最小值）。');
  lines.push('  数字 = 0 → 该租期内某天已被订满，该房型对此租期不可用，不要推给客户。');
  lines.push('  数字 > 0 → 租期内持续有空，可以直接报数推客户。');
  lines.push('  注：数据覆盖范围为今日起 180 天（' + lastDate + '），超出范围的租期为已有数据范围内的保守估计。');
  lines.push('');

  for (var ci = 0; ci < S2_CHECKINS.length; ci++) {
    var checkin = S2_CHECKINS[ci];
    if (checkin.date < todayStr) continue;
    lines.push('  【起租日 ' + checkin.label + ' / ' + checkin.date + '】');
    for (var li = 0; li < LEASE_ENDS.length; li++) {
      var lease = LEASE_ENDS[li];
      var effectiveEnd = lease.end <= lastDate ? lease.end : lastDate;
      var coverage = lease.end <= lastDate ? '完整覆盖' : '数据覆盖至 ' + lastDate;
      var mins = minAvailRange(checkin.date, effectiveEnd);
      if (!mins) {
        lines.push('    ' + lease.code + ' [' + lease.label + ', ' + coverage + ']：暂无数据');
        continue;
      }
      var parts = [];
      for (var cat in mins) parts.push(cat + ':' + mins[cat]);
      // append set data for 2BR if available (use same min logic)
      if (setsByDate) {
        var setCats = {};
        for (var ds2 in setsByDate) {
          if (ds2 < checkin.date || ds2 >= effectiveEnd) continue;
          for (var sk in setsByDate[ds2]) {
            if (setCats[sk] === undefined) setCats[sk] = setsByDate[ds2][sk];
            else if (setsByDate[ds2][sk] < setCats[sk]) setCats[sk] = setsByDate[ds2][sk];
          }
        }
        for (var sk2 in setCats) parts.push(sk2 + '-set:' + setCats[sk2]);
      }
      lines.push('    ' + lease.code + ' [' + lease.label + ', ' + coverage + ']：' + parts.join(', '));
    }
    lines.push('');
  }

  lines.push('【近期逐日房态（供短租 / 5-6月 / 8月起入住等非标准日期查询）】');
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 90);
  var cutoffStr = cutoff.toISOString().slice(0,10);
  for (var i = 0; i < avKeys.length; i++) {
    var date = avKeys[i];
    if (date < todayStr || date > cutoffStr) continue;
    var a = d.availability[date];
    var dparts = [];
    for (var k in a) dparts.push(k + ':' + a[k]);
    if (setsByDate[date]) {
      for (var sk3 in setsByDate[date]) dparts.push(sk3 + '-set:' + setsByDate[date][sk3]);
    }
    lines.push(date + ' → ' + dparts.join(', '));
  }
  lines.push('');

  lines.push('═════ 查房规则 ═════');
  lines.push('');
  lines.push('1. 先问租期（如客户未说）：Semester(12/22) / HalfYear(1/26或2/2) / FullYear(7/7或7/14)');
  lines.push('');
  lines.push('2. 入住日期：');
  lines.push('   • S2 固定起租日 (7.14 / 7.21 / 7.28)：直接用上方【S2 2026 房态】对应【起租日 + 租期】行的数字，不要用逐日数字');
  lines.push('   • 7月非固定日（7.14/7.21/7.28之间的日期），必须 fix 到前一个固定起租日，再查该固定起租日+租期的聚合数字：');
  lines.push('       7.15-7.20 → fix 到 7.14；7.22-7.27 → fix 到 7.21');
  lines.push('       ⚠️ 7.13 或更早（第一个固定起租日 7.14 之前）：不属于"两个固定日之间"，此类需求属于固定租期前的特殊申请，不能自动 fix，必须转人工处理。');
  lines.push('       回答模板（仅适用固定日之间的日期）：例 客户问 7.24 → 答"7.24 需 fix 到 7.21 起租，该周 [租期] 房态 SP-H:X / SP-L:Y / SD-H:Z…，租金从 7.21 开始计算"。严禁说"灵活入住"或"无需调价"。');
  lines.push('   • 5-6月短租：用逐日数字，提醒退租≤7.1');
  lines.push('   • 8月：用逐日数字 + 提醒"7.28 是默认最晚入住日"');
  lines.push('   • 9月：数字已按【仅统计8月有退租的房】过滤（7月前已空出的房已排除，不报给9月客户），直接报数即可（清洁排期问题再让人工确认）');
  lines.push('   • 10月+：转人工');
  lines.push('');
  lines.push('3. 周末入住主动建议改前一个周五。2026/9 内 9/5、9/12、9/19、9/26 均为周六。');
  lines.push('');
  var hasSets = false;
  for (var dk in setsByDate) { if (setsByDate[dk] && Object.keys(setsByDate[dk]).length) { hasSets = true; break; } }
  if (hasSets) {
    lines.push('4. 2BR（仅限 2BR）：2BR-High / 2BR-Low = 床位数；2BR-High-set / 2BR-Low-set = 整套数（aa.bb.01 与 aa.bb.02 同时空）。客户要整套 → 直接用 -set 数字回答"有 X 套"，无需让人工确认整套是否都空；客户要床位 → 用普通数字 + 附"性别配对请人工确认"。');
  } else {
    lines.push('4. 2BR（仅限 2BR）：剩余数=床位数（本次未抓到整套数据）。客户要整套 → "需人工确认整套是否都空"。床位回答附"性别配对请人工确认"。**注意：性别配对提醒仅适用于 2BR；MG 的 Ensuite Premium (ENP) 虽然共享起居室但有独立卧室+独立卫浴，不需要性别配对人工确认。**');
  }
  lines.push('');
  lines.push('5. 楼层：统一"以入住时实际安排为准"，不报具体楼层数');
  lines.push('6. 价格：统一"请群内查看最新报价"');
  lines.push('7. 180天外或缺失 → "暂未开放，请群内联系 Y Suites 同事"');
  lines.push('8. 不得编造任何数字');
  return lines.join('\n');

var currentProject = null;
var currentFlow = null;
var flowIndex = 0;
var chatHistory = [];
var isLoading = false;

function startProject(proj) {
  currentProject = proj;
  chatHistory = [];
  document.getElementById('select-screen').style.display = 'none';
  var cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  var labels = { mg:'Sydney · MG', starvia:'Hong Kong · Starvia', both:'Sydney & Hong Kong' };
  document.getElementById('header-sub').textContent = labels[proj];

  var header = document.getElementById('main-header');
  var backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.textContent = '← 返回';
  backBtn.onclick = goBack;
  header.querySelector('.header-left').prepend(backBtn);

  if (proj === 'both') {
    addAIMessage("你好！👋 我是 **Y Suites助手**，可以回答关于悉尼MG和香港Starvia的所有问题，直接问我吧！", null, null);
    document.getElementById('send-btn').disabled = false;
  } else {
    currentFlow = FLOWS[proj];
    flowIndex = 0;
    showFlowStep(0);
  }
  document.getElementById('msg-input').focus();
}

function goBack() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.getElementById('header-sub').textContent = '请选择项目';
  document.getElementById('messages').innerHTML = '';
  var backBtn = document.querySelector('.back-btn');
  if (backBtn) backBtn.remove();
  currentProject = null;
  currentFlow = null;
  chatHistory = [];
  document.getElementById('send-btn').disabled = true;
  document.getElementById('msg-input').value = '';
}

function showFlowStep(index) {
  var step = currentFlow[index];
  if (!step) return;
  setTimeout(function() {
    addAIMessage(step.text, step.options, step.id);
  }, index === 0 ? 0 : 300);
}

function handleOption(option, flowId) {
  addUserMessage(option);
  var freeChat = ["我有问题先问","还有问题想问","想了解更多学校距离","想了解更多学校","想多了解品牌","想了解具体房型","了解设施与服务"];
  if (freeChat.includes(option)) {
    addAIMessage("当然！直接问我吧 👇", null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  if (option === "我全了解了！") {
    var done = currentFlow[currentFlow.length - 1];
    addAIMessage(done.text, null, null);
    document.getElementById('send-btn').disabled = false;
    return;
  }
  var idx = currentFlow.findIndex(function(s){ return s.id === flowId; });
  var next = idx + 1;
  if (next < currentFlow.length) {
    flowIndex = next;
    showFlowStep(next);
  }
  document.getElementById('send-btn').disabled = false;
}

function addAIMessage(text, options, flowId) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';

  var av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = 'Y';

  var bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:6px 0;display:block">')
    .replace(/\n/g, '<br>');

  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);

  if (options) {
    var optDiv = document.createElement('div');
    optDiv.className = 'options';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = function() { handleOption(opt, flowId); };
      optDiv.appendChild(btn);
    });
    msgs.appendChild(optDiv);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg user';
  var av = document.createElement('div');
  av.className = 'avatar user';
  av.textContent = '我';
  var bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar ai">Y</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });
  var typing = addTyping();

  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEMS[currentProject || 'both'] + '\n\n' + (currentProject === 'starvia' ? '【实时房态】Starvia by Y Suites（Fortress Hill, 香港项目）暂无实时房态数据接入。被问到 Starvia 房态时，统一回答"实时房态请群内查询置顶或联系 Y Suites 同事确认"。绝对禁止使用任何数字编造房态。' : formatAvailabilityContext()) },
          ...chatHistory.slice(-8)
        ],
        max_tokens: 500
      })
    });
    if (!res.ok) {
      var errBody = '';
      try { var errData = await res.json(); errBody = JSON.stringify(errData); } catch(_) { errBody = await res.text().catch(()=>''); }
      throw new Error('HTTP ' + res.status + ': ' + errBody.slice(0, 300));
    }
    var data = await res.json();
    var reply = data.choices && data.choices[0] ? data.choices[0].message.content : '抱歉，暂时无法回答，请直接在群里问Y Suites同事 😊';
    typing.remove();
    chatHistory.push({ role: 'assistant', content: reply });
    addAIMessage(reply, null, null);
  } catch(e) {
    typing.remove();
    console.error('Qwen API error:', e.message);
    var errMsg = e.message || '';
    var hint = (errMsg.includes('400') && (errMsg.includes('Access denied') || errMsg.includes('account') || errMsg.includes('standing'))) ? '（API账户异常，请联系管理员检查Qwen API Key是否有效）' :
               errMsg.includes('400') ? '（输入超长，请刷新页面重新开始）' :
               errMsg.includes('401') ? '（API Key 无效）' :
               errMsg.includes('429') ? '（请求太频繁，稍后再试）' :
               errMsg.includes('fetch') || errMsg.includes('network') ? '（网络连接失败）' : '';
    addAIMessage('⚠️ 连接出现问题' + hint + '，请直接在群里问Y Suites同事 😊<br><small style="opacity:0.5;font-size:11px">' + errMsg.slice(0,120) + '</small>', null, null);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
