<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y Suites Pricing Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f0f4f4;color:#1a1a2e;font-size:13px;}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:360px;min-width:360px;background:white;border-right:1px solid #e0e0e0;overflow-y:auto;display:flex;flex-direction:column;}
.preview-pane{flex:1;overflow-y:auto;background:#f0f4f4;padding:24px;}

/* Sidebar header */
.sb-header{background:#1a1a2e;color:white;padding:16px 20px;}
.sb-header h2{font-size:14px;font-weight:800;letter-spacing:0.3px;}
.sb-header p{font-size:10px;color:rgba(255,255,255,0.5);margin-top:3px;}

/* Tabs */
.tabs{display:flex;border-bottom:2px solid #f0f0f0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab.active{color:#00BAB3;border-bottom-color:#00BAB3;}
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}

/* Form elements */
.section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:#00BAB3;margin:14px 0 8px;}
.section-label:first-child{margin-top:0;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:10px;font-weight:600;color:#666;margin-bottom:3px;}
.field input,.field select{width:100%;padding:7px 10px;border:1.5px solid #e8e8e8;border-radius:7px;font-family:'Montserrat',sans-serif;font-size:12px;color:#1a1a2e;outline:none;transition:border .2s;}
.field input:focus,.field select:focus{border-color:#00BAB3;}

/* Room rows */
.room-row{background:#f8fffe;border:1.5px solid #e0f5f4;border-radius:10px;padding:12px;margin-bottom:10px;}
.room-row-header{font-size:11px;font-weight:800;color:#1a1a2e;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.room-row-header span{color:#00BAB3;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* Avail select */
.avail-row{display:grid;grid-template-columns:1fr 80px;gap:6px;align-items:end;}

/* Export button */
.export-btn{margin:16px;padding:13px;background:#00BAB3;color:white;border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:0.3px;transition:background .2s;}
.export-btn:hover{background:#009e98;}

/* Preview card styles */
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 40px rgba(0,186,179,0.12),0 2px 8px rgba(0,0,0,0.06);}
.p-header{background:#1a1a2e;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;}
.p-header h1{font-size:12px;font-weight:800;color:white;text-transform:uppercase;line-height:1.5;}
.p-header p{font-size:9px;color:rgba(255,255,255,0.45);margin-top:4px;}
.p-header img{height:30px;width:auto;}
.p-accent{height:4px;background:linear-gradient(90deg,#00BAB3 60%,#F08080 100%);}
.p-sec-title{background:#00BAB3;color:white;text-align:center;padding:8px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
table{width:100%;border-collapse:collapse;}
.pt th{background:#1a1a2e;color:white;padding:8px 6px;font-size:8.5px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:0.3px;}
.pt th:first-child{text-align:left;padding-left:14px;}
.pt td{padding:8px 6px;font-size:10px;text-align:center;border-bottom:1px solid #eef8f8;vertical-align:middle;}
.pt td.type{text-align:left;padding-left:14px;font-weight:800;font-size:10px;border-left:3px solid #00BAB3;}
.pt td.floor{color:#777;font-size:9.5px;}
.pt tr:nth-child(even) td{background:#f7fdfd;}
.strike{text-decoration:line-through;color:#ccc;font-size:9px;}
.hot{color:#F08080;font-weight:800;font-size:11px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:8.5px;font-weight:700;white-space:nowrap;}
.bg{background:#e0faf9;color:#007a75;border:1.5px solid #00BAB3;}
.bo{background:#FFF3E0;color:#a05000;border:1.5px solid #F9CB9C;}
.br{background:#FFE8E8;color:#c0392b;border:1.5px solid #F08080;}
.bb{background:#EEF2FF;color:#2d5aac;border:1.5px solid #6D9EEB;font-size:8px;}
.p-note{padding:8px 14px;font-size:9px;color:#666;background:#FFFBF0;border-top:2px solid #F9CB9C;line-height:1.6;}
.p-note strong{color:#a05000;}
.p-promo-hdr{background:#F08080;color:white;text-align:center;padding:9px;font-size:11px;font-weight:900;letter-spacing:0.6px;text-transform:uppercase;margin-top:3px;}
.p-promo-sub{background:#1a1a2e;color:rgba(255,255,255,0.6);text-align:center;padding:5px;font-size:9px;}
.p-promo-sub strong{color:#F9CB9C;}
.prt th{background:#f5f5f5;color:#1a1a2e;padding:8px 6px;font-size:8.5px;font-weight:700;text-align:center;text-transform:uppercase;border-bottom:2px solid #e0e0e0;}
.prt th:first-child{text-align:left;padding-left:14px;}
.prt td{font-size:10px;vertical-align:middle;padding:10px 8px;border-bottom:1px solid #f0f0f0;text-align:center;}
.prt td:first-child{font-weight:700;text-align:left;padding-left:14px;}
.prt tr:last-child td{border-bottom:none;}
.prt tr:nth-child(even) td{background:#fafafa;}
.pb{color:#F08080;font-weight:900;font-size:13px;display:block;}
.pc{display:inline-block;background:#f5f5f5;border:1px dashed #aaa;border-radius:4px;padding:1px 6px;font-size:8px;color:#555;margin-top:3px;letter-spacing:0.5px;font-weight:600;}
.pg{color:#007a75;font-weight:700;}
.p-cancel{padding:11px 16px;background:#fff8f8;border-top:3px solid #F08080;}
.p-cancel-title{font-size:9px;font-weight:800;margin-bottom:3px;text-transform:uppercase;}
.p-cancel-title span{color:#F08080;}
.p-cancel p{font-size:9px;color:#666;line-height:1.7;}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <h2>Y Suites Pricing Editor</h2>
      <p>修改内容后预览自动更新</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('rooms')">房型价格</div>
      <div class="tab" onclick="switchTab('promo')">促销优惠</div>
      <div class="tab" onclick="switchTab('general')">基本信息</div>
    </div>

    <!-- TAB: ROOMS -->
    <div class="tab-content active" id="tab-rooms">
      <div id="rooms-form"></div>
    </div>

    <!-- TAB: PROMO -->
    <div class="tab-content" id="tab-promo">
      <div class="section-label">Rent Rebate</div>
      <div class="grid-3">
        <div class="field"><label>Full Year</label><input id="p-fy-rebate" value="$1,000" oninput="render()"></div>
        <div class="field"><label>Half Year</label><input id="p-hy-rebate" value="$500" oninput="render()"></div>
        <div class="field"><label>Semester</label><input id="p-sem-rebate" value="$150" oninput="render()"></div>
      </div>
      <div class="section-label">Promo Codes</div>
      <div class="field"><label>Full Year Code</label><input id="p-fy-code" value="S226MGEARLYTI" oninput="render()"></div>
      <div class="field"><label>Half Year Code</label><input id="p-hy-code" value="S226MGEARLYTFY" oninput="render()"></div>
      <div class="section-label">Lease End Dates</div>
      <div class="field"><label>Full Year ends</label><input id="p-fy-end" value="7/14 July 2027" oninput="render()"></div>
      <div class="field"><label>Half Year ends</label><input id="p-hy-end" value="26 Jan or 2 Feb 2027" oninput="render()"></div>
      <div class="field"><label>Semester ends</label><input id="p-sem-end" value="22 Dec 2026" oninput="render()"></div>
      <div class="section-label">其他优惠</div>
      <div class="field"><label>团体订房额外折扣</label><input id="p-group" value="$200" oninput="render()"></div>
      <div class="field"><label>接机补贴上限</label><input id="p-airport" value="$50" oninput="render()"></div>
    </div>

    <!-- TAB: GENERAL -->
    <div class="tab-content" id="tab-general">
      <div class="section-label">基本信息</div>
      <div class="field"><label>更新日期</label><input id="g-updated" value="30th Apr 2026" oninput="render()"></div>
      <div class="field"><label>促销期间</label><input id="g-promo-period" value="30 Apr 2026 – 31 May 2026" oninput="render()"></div>
      <div class="field"><label>入住日期</label><input id="g-lease-start" value="14 / 21 / 28 July 2026" oninput="render()"></div>
    </div>

    <button class="export-btn" onclick="exportHTML()">⬇ 导出 HTML 文件</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-pane">
    <div id="preview"></div>
  </div>
</div>

function buildRoomsForm() {
  const container = document.getElementById('rooms-form');
  container.innerHTML = ROOMS.map((r,i) => `
    <div class="room-row">
      <div class="room-row-header"><span>${i+1}.</span> ${r.type} — ${r.floor}</div>
      <div class="grid-2">
        <div class="field"><label>Full Year</label><input id="r${i}-fy" value="${r.fy}" oninput="updateRoom(${i},'fy',this.value)"></div>
        <div class="field"><label>Semester</label><input id="r${i}-sem" value="${r.sem}" oninput="updateRoom(${i},'sem',this.value)"></div>
        <div class="field"><label>Half Year 划线</label><input id="r${i}-hyo" value="${r.hy_orig}" oninput="updateRoom(${i},'hy_orig',this.value)"></div>
        <div class="field"><label>Half Year 促销</label><input id="r${i}-hyp" value="${r.hy_promo}" oninput="updateRoom(${i},'hy_promo',this.value)"></div>
      </div>
      <div style="font-size:10px;font-weight:700;color:#666;margin:8px 0 6px;">Early Checkin / Short Term</div>
      <div class="avail-row">
        <div class="field" style="margin:0"><input id="r${i}-aet" value="${r.ae_text}" oninput="updateRoom(${i},'ae_text',this.value)"></div>
        <div class="field" style="margin:0"><select id="r${i}-aes" onchange="updateRoom(${i},'ae_style',this.value)">${STYLE_OPTS.map(o=>`<option value="${o.value}"${r.ae_style===o.value?' selected':''}>${o.label}</option>`).join('')}</select></div>
      </div>
      <div style="font-size:10px;font-weight:700;color:#666;margin:8px 0 6px;">July Checkin</div>
      <div class="avail-row">
        <div class="field" style="margin:0"><input id="r${i}-ajt" value="${r.aj_text}" oninput="updateRoom(${i},'aj_text',this.value)"></div>
        <div class="field" style="margin:0"><select id="r${i}-ajs" onchange="updateRoom(${i},'aj_style',this.value)">${STYLE_OPTS.map(o=>`<option value="${o.value}"${r.aj_style===o.value?' selected':''}>${o.label}</option>`).join('')}</select></div>
      </div>
    </div>
  `).join('');
}

function updateRoom(i, key, val) {
  ROOMS[i][key] = val;
  render();
}

function v(id){ return document.getElementById(id)?.value || ''; }

function badge(text, style){ return `<span class="badge b${style}">${text}</span>`; }

function renderRows(){
  let html='', prev='';
  for(let i=0;i<ROOMS.length;i++){
    const r=ROOMS[i];
    const cnt=ROOMS.filter(x=>x.type===r.type).length;
    const tc=r.type!==prev?`<td class="type" rowspan="${cnt}">${r.type}</td>`:'';
    html+=`<tr>${tc}<td class="floor">${r.floor}</td><td>${r.fy}</td><td><span class="strike">${r.hy_orig}</span> <span class="hot">${r.hy_promo}</span></td><td>${r.sem}</td><td>${badge(r.ae_text,r.ae_style)}</td><td>${badge(r.aj_text,r.aj_style)}</td></tr>`;
    prev=r.type;
  }
  return html;
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{

  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function formatAvail(count, isSet) {
  if (count <= 0) return {text: 'sold out', style: 'r'};
  if (isSet) {
    if (count === 1) return {text: '1 set', style: 'o'};
    return {text: count + ' sets', style: count <= 3 ? 'o' : 'g'};
  }
  if (count === 1) return {text: '1 room', style: 'o'};
  return {text: count + ' rooms', style: count <= 5 ? 'o' : 'g'};
}

const CATEGORY_TO_ROOM_IDX = {
  'SP-High': 0, 'SP-Low': 1, 'SD-High': 2, 'SD-Low': 3,
  '2BR-High': 4, '2BR-Low': 5, 'ENP': 6
};

async function loadLatestAvailability() {
  try {
    const res = await fetch('../data/availability.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const today = new Date().toISOString().slice(0, 10);
    const julyKey = '2026-07-14';
    const earlyAvail = data.availability[today] || data.availability[Object.keys(data.availability)[0]];
    const julyAvail = data.availability[julyKey];

    for (const [catCode, roomIdx] of Object.entries(CATEGORY_TO_ROOM_IDX)) {
      const isSet = catCode.startsWith('2BR');
      if (earlyAvail && earlyAvail[catCode] !== undefined) {
        const f = formatAvail(earlyAvail[catCode], isSet);
        ROOMS[roomIdx].ae_text = f.text;
        ROOMS[roomIdx].ae_style = f.style;
      }
      if (julyAvail && julyAvail[catCode] !== undefined) {
        const f = formatAvail(julyAvail[catCode], isSet);
        ROOMS[roomIdx].aj_text = f.text;
        ROOMS[roomIdx].aj_style = f.style;
      }
    }

    const updatedField = document.getElementById('g-updated');
    if (updatedField && data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      updatedField.value = d.toLocaleDateString('zh-CN', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '-');
    }

    const banner = document.createElement('div');
    banner.style.cssText = 'background:#e0faf9;color:#007a75;padding:8px 14px;font-size:11px;font-weight:600;border-bottom:1px solid #00BAB3;text-align:center;';
    banner.textContent = '✓ 已加载最新房态 · 数据时间：' + new Date(data.lastUpdated).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}) + ' · 规则：30天连续无占位';
    document.body.insertBefore(banner, document.body.firstChild);
  } catch (e) {
    console.warn('Auto-load failed:', e.message);
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#FFE8E8;color:#c0392b;padding:8px 14px;font-size:11px;font-weight:600;border-bottom:1px solid #F08080;text-align:center;';
    banner.textContent = '⚠ 未能加载实时房态 (' + e.message + ')，显示的是模板默认值，请手动核对';
    document.body.insertBefore(banner, document.body.firstChild);
  }
}

(async () => {
  await loadLatestAvailability();
